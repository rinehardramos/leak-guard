name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.9", "3.12"]
        gitleaks: [present, absent]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install gitleaks (Linux)
        if: matrix.gitleaks == 'present' && runner.os == 'Linux'
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz -O /tmp/gl.tgz
          tar -xzf /tmp/gl.tgz -C /usr/local/bin gitleaks
          chmod +x /usr/local/bin/gitleaks

      - name: Install gitleaks (macOS)
        if: matrix.gitleaks == 'present' && runner.os == 'macOS'
        run: brew install gitleaks

      - name: Install test deps
        run: pip install pytest

      - name: Run selftest
        run: python plugins/leak-guard/hooks/scanner.py selftest

      - name: Run pytest
        run: pytest tests/test_scanner.py -v

      - name: Smoke test
        run: |
          # Assemble the fake credential from parts so no literal secret appears in source.
          FAKE_CRED="CSKC:Scds""JCCKLS""LKDKLCNLKCEI""NK2233as"
          PAYLOAD="{\"hook_event_name\":\"UserPromptSubmit\",\"prompt\":\"my key ${FAKE_CRED}\",\"session_id\":\"ci\"}"
          OUTPUT=$(echo "$PAYLOAD" | python plugins/leak-guard/hooks/scanner.py hook-user-prompt)
          echo "$OUTPUT" | python -c "
          import sys, json
          d = json.load(sys.stdin)
          ctx = d['hookSpecificOutput']['additionalContext']
          assert 'leak-guard' in ctx and '[REDACTED]' in ctx, f'smoke failed: {ctx[:200]}'
          "
          echo "Smoke test passed"
