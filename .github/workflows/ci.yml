name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.9", "3.12"]
        gitleaks: [present, absent]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install gitleaks (Linux)
        if: matrix.gitleaks == 'present' && runner.os == 'Linux'
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz -O /tmp/gl.tgz
          tar -xzf /tmp/gl.tgz -C /usr/local/bin gitleaks
          chmod +x /usr/local/bin/gitleaks

      - name: Install gitleaks (macOS)
        if: matrix.gitleaks == 'present' && runner.os == 'macOS'
        run: brew install gitleaks

      - name: Install test deps
        run: pip install pytest

      - name: Run selftest
        run: python plugins/leak-guard/hooks/scanner.py selftest

      - name: Run pytest
        run: pytest tests/test_scanner.py tests/test_integration.py -v

      - name: Smoke test (PreToolUse — secret in Bash input)
        run: |
          # Assemble the fake credential from parts so no literal secret appears in source.
          HALF1="AKIAY3FDSN"
          HALF2="DKFKSIDJSW"
          PAYLOAD="{\"hook_event_name\":\"PreToolUse\",\"tool_name\":\"Bash\",\"tool_input\":{\"command\":\"echo ${HALF1}${HALF2}\"}}"
          OUTPUT=$(echo "$PAYLOAD" | python plugins/leak-guard/hooks/scanner.py hook-pre-tool)
          echo "$OUTPUT" | python -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['hookSpecificOutput']['permissionDecision'] == 'deny', 'pre-tool smoke failed'
          "
          echo "Pre-tool smoke passed"

      - name: Smoke test (PostToolUse — secret in Bash output)
        run: |
          HALF1="AKIAY3FDSN"
          HALF2="DKFKSIDJSW"
          PAYLOAD="{\"hook_event_name\":\"PostToolUse\",\"tool_name\":\"Bash\",\"tool_input\":{\"command\":\"custom-cmd\"},\"tool_response\":{\"stdout\":\"key=${HALF1}${HALF2}\"}}"
          OUTPUT=$(echo "$PAYLOAD" | python plugins/leak-guard/hooks/scanner.py hook-post-tool)
          echo "$OUTPUT" | python -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['decision'] == 'block', 'post-tool smoke failed'
          "
          echo "Post-tool smoke passed"
