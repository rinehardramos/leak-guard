# leak-guard default allowlist (ships with the plugin).
# User overrides live at ~/.claude/leak-guard/allowlist.toml and are merged on top.
#
# literal        — exact strings to ignore (case-sensitive)
# rule_ids       — rule IDs to fully disable (e.g. "us-zip" if too noisy)
# path_globs     — paths where ALL rules are suppressed (fnmatch globs)
# bash_globs     — bash commands whose PostToolUse output is suppressed
# silent_blocks  — set to true in your USER allowlist to suppress stderr
#                  notifications (blocks still happen; only the visible
#                  warning is hidden). Default: false.

literal = [
    # Common placeholder / dummy emails (RFC 2606 reserved domains)
    "user@example.com",
    "test@example.com",
    "admin@example.com",
    "noreply@example.com",
    "user@example.org",
    "admin@example.org",
    "test@example.org",
    "user@example.net",
    "admin@example.net",
    "test@example.net",
    "foo@bar.com",
    # Dummy cards (documentation/test values — still Luhn-valid)
    "4242 4242 4242 4242",
    "4242424242424242",
]

rule_ids = [
    # Disabled by default — too noisy on code. Enable by removing from this list
    # in your user allowlist, or set severity high in pii.toml.
    "us-zip",
    "ipv4-private",
]

path_globs = [
    "*/node_modules/*",
    "*/.git/*",
    "*/dist/*",
    "*/build/*",
    # leak-guard's own config/rule files — allowlist entries contain example
    # emails and high-entropy strings by design. Without this self-reference
    # the scanner blocks its own allowlist (bootstrapping problem).
    "*/leak-guard/plugins/leak-guard/rules/*.toml",
    "*/leak-guard/plugins/leak-guard/hooks/*.json",
    "*/leak-guard/plugins/leak-guard/hooks/scanner.py",
    "*/leak-guard/plugins/leak-guard/proxy.py",
    "*/leak-guard/plugins/leak-guard/.claude-plugin/*.json",
    "*/leak-guard/.claude-plugin/*.json",
    "*/leak-guard/tests/fixtures/*.toml",
    "*/leak-guard/tests/fixtures/*.py",
    "*/leak-guard/allowlist.toml",
    "*/leak-guard/README.md",
    "*/leak-guard/CHANGELOG.md",
    "*/plugins/cache/leak-guard/*/hooks/scanner.py",
    "*/plugins/cache/leak-guard/*/rules/*.toml",
    "*/.claude-plugin/plugin.json",
    # Claude Code tooling — plugin node IDs, MCP configs, project memory,
    # and skill cache all trigger entropy/email false positives.
    "*/.claude/settings.json",
    "**/.mcp.json",
    "*/.claude/mcp_servers.json",
    "*/.claude/projects/*/memory/*.md",
    "*/.claude/plugins/cache/**/*.md",
    "*/.claude/mcp-servers/**/*.py",
    # CI workflow files — contain environment variable references, not secrets.
    "*/.github/workflows/*.yml",
]

bash_globs = [
    # Git — output is SHAs, refs, commit messages, diffs. Never secrets.
    "*git log*",
    "*git status*",
    "*git diff*",
    "*git branch*",
    "*git checkout*",
    "*git fetch*",
    "*git remote*",
    "*git show*",
    "*git tag*",
    "*git stash*",
    "*git ls-tree*",
    "*git add*",
    "*git commit*",
    "*git -C*",
    # GitHub CLI — GraphQL node IDs (PVTI_, PVT_, R_kw*, I_kw*) are internal
    # GitHub object identifiers, not secrets.
    "*gh pr*",
    "*gh issue*",
    "*gh run*",
    "*gh project*",
    "*gh api graphql*",
    "*gh repo list*",
    # Package managers — test UUIDs pass Luhn check (FP credit card); pip
    # PATH warnings contain base64-like directory hashes.
    "*npm run*",
    "*npm test*",
    "*pnpm*",
    "*pip install*",
    "*pip3 install*",
    "*uv run*pytest*",
    # leak-guard CLI — output is file paths and status messages, not secrets.
    "*scanner.py selftest*",
    "*scanner.py install*",
    "*scanner.py hook-settings*",
    # Test runners — pytest output contains node IDs, UUIDs, and module paths
    # that trigger entropy and Luhn false positives.
    "*pytest*",
    "*-m pytest*",
    # Process listing — PIDs and process names, never secrets.
    "*ps aux*",
    "*ps*grep*",
    # Heredoc Python — macOS temp paths (/var/folders/...) trigger entropy FP.
    "*python3 - <<*",
    "*python3 -*EOF*",
    # Reading Claude Code config — contains plugin node IDs, not secrets.
    "*cat*/.claude/settings.json*",
    "*settings.json*json.tool*",
    "*cat*/.github/workflows*",
    # Binary analysis tools — output is mangled identifiers, not secrets.
    "*strings*",
    # Agent task output files — contain session UUIDs and message IDs.
    "*tail*tasks/*.output*",
    "*wc*tasks/*.output*",
    "*grep*tasks/*.output*",
    "*cat*tasks/*.output*",
]
